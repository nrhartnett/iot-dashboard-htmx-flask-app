<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask + HTMX App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div id="content-area" class="text-center p-10 bg-white shadow-xl rounded-lg">
        <h2 class="text-2xl mb-6 text-gray-800">Ready to start?</h2>
        
        <button 
            hx-post="/welcome" 
            hx-target="#content-area" 
            hx-swap="innerHTML"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition duration-300">
            Click Me
        </button>
    </div>

</body>
</html>
